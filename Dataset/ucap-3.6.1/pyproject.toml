[tool.mypy]
ignore_missing_imports = true
exclude = ["tests?", "build", "docs"]

[tool.ruff]
lint.select = ["ALL"]
lint.ignore = [
    "ANN",       # Mypy
    "COM812",   # Black
    "E501",     # Black
    "S101",     # "Use of `assert` detected"
    "D100",     # Missing docstring
    "D101",     # Missing docstring
    "D102",     # Missing docstring
    "D103",     # Missing docstring
    "D104",     # Missing docstring
    "D105",     # Missing docstring
    "D106",     # Missing docstring
    "D107",     # Missing docstring
    "EM101",    # "Exception must not use a string literal, assign to variable first"
    "EM102",    # "Exception must not use an f-string literal, assign to variable first"
    "TRY003",   # "Avoid specifying long messages outside the exception class"
    "D211",     # no-blank-line-before-class
    "D212",     # multi-line-summary-first-line
    "D400",     # First line should end with a period
    "D415",     # First line should end with a period, question mark, or exclamation point
    "D407",     # Missing dashed underline after section
    "PD011",    # Use `.to_numpy()` instead of `.values`
    "UP035",    # Import from `typing` instead: `cast`
    "TD002",    # Missing author in TODO
    "TD003",    # Missing issue link on the line following this TODO
    "TD004",    # Missing colon in TODO
    "FIX002",   # Line contains TODO, consider resolving the issue
    "D200",     # One-line docstring should fit on one line
    "D205",     # 1 blank line required between summary line and description
    "PLR0402",  # Use import in lieu of alias (problematic for mocking)
    "ISC001",   # Avoid conflicts with formatters
    "D203",     # Not needed, and conflicts with formatter
]
extend-exclude = [
    "**/generated/*",
    "build/*",
    "single_transformation_server_logging.py", # Variable naming problems coming from logging.handlers
    "docs/*",
    "**/test/*",                               # To be removed
    "**/converter_template/*"                  # To be removed
]
line-length = 80
target-version = "py37"

[tool.ruff.lint.flake8-pytest-style]
parametrize-names-type = "csv"

[tool.ruff.lint.per-file-ignores]
"**/tests/*" = [
    "SLF001",   # Private member accessed
    "PLR2004",  # Magic value used in comparison
    "PD901",    # Bad variable name
]
"**/protobuf/*" = ["SLF001"]
"ucap/common/*.py" = ["D401"]
